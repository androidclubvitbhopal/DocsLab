name: Bug Report
description: Create a report to help us improve the Android Club Docs platform.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below.
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of the project are you using? (Leave blank if you don't know)
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: When I click on X, Y happens instead of Z...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or videos to help explain your problem.
  - type: dropdown
    id: browsers
    attributes:
      label: Desktop/Mobile browser
      description: Please select the environment where the bug occurred.
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - iOS Safari
        - Chrome for Android
        - Other
